name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: ESP-IDF build (esp32c6)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.5
          target: esp32c6
          command: idf.py set-target esp32c6 && idf.py build

      - name: Upload dependencies lock
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dependencies-lock
          path: dependencies.lock

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: firmware
          path: |
            build/*.bin
            build/*.elf
            build/*.map
