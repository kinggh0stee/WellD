name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    name: ESP-IDF build (esp32c6)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@e6f5c74232b1ccd4c97ed641f1e48553853f1fd5  # v1.2.0
        with:
          esp_idf_version: v5.3.5
          target: esp32c6
          command: idf.py set-target esp32c6 && idf.py build

      - name: Upload dependencies lock
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: success()
        with:
          name: dependencies-lock
          path: dependencies.lock

      - name: Upload firmware
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: success()
        with:
          name: firmware
          path: |
            build/*.bin
            build/*.elf
            build/*.map
