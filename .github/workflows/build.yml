name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

# All jobs use inline git checkout and docker run instead of third-party actions
# so the pipeline is self-contained within kinggh0stee/WellD.

jobs:
  build:
    name: ESP-IDF build (esp32c6)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git -c advice.detachedHead=false checkout FETCH_HEAD

      - name: Build firmware and generate OTA image
        run: |
          cat > /tmp/welld_build.sh << 'BUILDEOF'
          set -e
          . $IDF_PATH/export.sh
          idf.py set-target esp32c6
          idf.py build
          VER=$(grep -oP 'set\(PROJECT_VER "\K[0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VER"
          FILE_VER=$(printf "0x%02X%02X%02X00" "$MAJOR" "$MINOR" "$PATCH")
          OTA_SCRIPT=$(find $IDF_PATH -name ota_image_create.py 2>/dev/null | head -1)
          if [ -n "$OTA_SCRIPT" ]; then
            python "$OTA_SCRIPT" \
              --manufacturer-code 0x1234 \
              --image-type 0x0001 \
              --file-version "$FILE_VER" \
              --output build/welld.ota.zigbee \
              build/welld.bin
            echo "OTA image generated: build/welld.ota.zigbee"
          else
            echo "WARNING: ota_image_create.py not found — skipping OTA image"
          fi
          BUILDEOF
          chmod +x /tmp/welld_build.sh
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/project" \
            -v /tmp/welld_build.sh:/tmp/welld_build.sh:ro \
            -w /project \
            espressif/idf:v6.0.1 \
            bash /tmp/welld_build.sh

  static-analysis:
    name: C static analysis (cppcheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git -c advice.detachedHead=false checkout FETCH_HEAD

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,style,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --inline-suppr \
            --error-exitcode=1 \
            -I components/sensor/include \
            -I components/zigbee/include \
            -I components/welld_core/include \
            -I main \
            --std=c11 \
            components/sensor/*.c \
            components/zigbee/*.c \
            components/welld_core/*.c \
            main/*.c

  version-bump:
    name: Version bump check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout (with base branch for diff)
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          git fetch origin "${GITHUB_SHA}"
          git -c advice.detachedHead=false checkout "${GITHUB_SHA}"

      - name: Check CMakeLists.txt version bump
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          if echo "$CHANGED" | grep -qE '^(main/|components/)'; then
            if ! echo "$CHANGED" | grep -q '^CMakeLists.txt$'; then
              echo "::error::Firmware source changed but CMakeLists.txt (PROJECT_VER) was not bumped."
              echo "Changed files:"
              echo "$CHANGED"
              exit 1
            fi
          fi
          echo "Version bump check passed."

  host-tests:
    name: Host unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git -c advice.detachedHead=false checkout FETCH_HEAD

      - name: Configure
        run: cmake -S test/host -B test/host/build

      - name: Build
        run: cmake --build test/host/build

      - name: Run
        run: ctest --test-dir test/host/build --output-on-failure

  unit-tests:
    name: On-device unit tests (build only)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git -c advice.detachedHead=false checkout FETCH_HEAD

      - name: Build sensor unit-test app
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/project" \
            -w /project/test/sensor \
            espressif/idf:v6.0.1 \
            bash -c ". \$IDF_PATH/export.sh && idf.py set-target esp32c6 && idf.py build"

      - name: Build welld_core unit-test app
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/project" \
            -w /project/test/welld_core \
            espressif/idf:v6.0.1 \
            bash -c ". \$IDF_PATH/export.sh && idf.py set-target esp32c6 && idf.py build"

  z2m-converter-tests:
    name: Zigbee2MQTT converter tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git -c advice.detachedHead=false checkout FETCH_HEAD

      - name: Install Node.js 20
        run: |
          curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
          sudo apt-get install -y nodejs

      - name: Install converter dependencies
        working-directory: zigbee2mqtt
        run: npm ci --ignore-scripts

      - name: Run converter tests
        working-directory: zigbee2mqtt
        run: npm test
