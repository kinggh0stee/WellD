name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    name: ESP-IDF build (esp32c6)
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@e6f5c74232b1ccd4c97ed641f1e48553853f1fd5  # v1.2.0
        with:
          esp_idf_version: v5.3.5
          target: esp32c6
          command: idf.py set-target esp32c6 && idf.py build

      - name: Commit generated files
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sdkconfig dependencies.lock
          git diff --cached --quiet || (git commit -m "chore: update sdkconfig and dependencies.lock [skip ci]" && git push)

      - name: Upload dependencies lock
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
        if: success()
        with:
          name: dependencies-lock
          path: dependencies.lock

      - name: Upload firmware
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4  # v5.0.0
        if: success()
        with:
          name: firmware
          path: |
            build/*.bin
            build/*.elf
            build/*.map
