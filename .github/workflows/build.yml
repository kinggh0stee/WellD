name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    name: ESP-IDF build (esp32c6)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.5
          target: esp32c6
          command: idf.py set-target esp32c6 && idf.py build

      - name: Commit generated files
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sdkconfig dependencies.lock
          git diff --cached --quiet || git commit -m "chore: update sdkconfig and dependencies.lock [skip ci]" && git push

      - name: Upload dependencies lock
        uses: actions/upload-artifact@v5
        if: success()
        with:
          name: dependencies-lock
          path: dependencies.lock

      - name: Upload firmware
        uses: actions/upload-artifact@v5
        if: success()
        with:
          name: firmware
          path: |
            build/*.bin
            build/*.elf
            build/*.map
